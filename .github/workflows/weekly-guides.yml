name: Weekly Remedy Guides

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-guides:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run remedies agent
        run: python agent/remedies_agent.py

      - name: Commit updated guides
        run: |
          git config user.name "SolarPunk Bot"
          git config user.email "bot@solarpunk-remedies.local"
          git add guides/ data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "bot: weekly guide refresh ($(date +%Y-%m-%d))"
            git push
          fi
